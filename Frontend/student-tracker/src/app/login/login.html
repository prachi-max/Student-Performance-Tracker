<div class="auth-container">

  <div *ngIf="loginSuccess" class="success-screen">
    <div class="checkmark">✔</div>
    <h2>Welcome Back!</h2>
    <p>Login successful 🎉</p>
  </div>

  <div class="auth-card" *ngIf="!loginSuccess">

    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your account</p>

    <!-- Demo Account -->
    <div class="demo-box">
      <h4>Demo Recruiter Account</h4>
      <p><strong>Email:</strong> pintu.jadav40@gmail.com </p>
      <p><strong>Password:</strong> pintu@40</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <input
        type="email"
        placeholder="demo@studenttracker.com"
        formControlName="email">

      <input
        type="password"
        placeholder="Demo@123"
        formControlName="password">

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

  </div>

</div>
