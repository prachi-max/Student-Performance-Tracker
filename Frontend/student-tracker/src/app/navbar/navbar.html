  <div class="logo">
     <img
    src="assets/logo.png"  width="100" height="40"
     alt="StudentTracker Logo"
    class="logo-image"
  >
    <span class="logo-icon"></span>
  
  </div>

  <ul class="nav-links">
  <li><a routerLink="/">Home</a></li>
  <li><a routerLink="/about">About</a></li>
  <li><a routerLink="/articles">Articles</a></li>
